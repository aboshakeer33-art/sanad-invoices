<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سند لاكسسوارات - نظام المحاسبة المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-dark: #1e40af;
            --secondary: #64748b;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            position: relative;
            overflow: hidden;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 450px;
        }

        .login-logo { text-align: center; margin-bottom: 40px; }
        .login-logo .logo-icon {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px; color: white;
        }

        .input-group { position: relative; margin-bottom: 24px; }
        .input-group i {
            position: absolute; right: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-light); font-size: 18px;
        }
        .input-group input {
            width: 100%; padding: 16px 48px 16px 16px;
            border: 2px solid var(--border); border-radius: 12px;
            font-size: 16px; font-family: inherit;
        }

        .login-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 700; cursor: pointer;
        }

        /* Layout */
        .app-container { display: none; min-height: 100vh; }
        
        .sidebar {
            width: 280px; background: var(--card-bg);
            height: 100vh; position: fixed; right: 0; top: 0;
            box-shadow: var(--shadow); z-index: 1000;
            display: flex; flex-direction: column;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 18px; margin-bottom: 8px;
            border-radius: 12px; cursor: pointer;
            color: var(--text-light); font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(30, 58, 138, 0.05); color: var(--primary);
        }

        .main-content { margin-right: 280px; min-height: 100vh; padding: 30px; }

        .btn {
            padding: 12px 24px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection {
                position: absolute; left: 0; top: 0; width: 100%;
                padding: 20mm; background: white;
            }
        }

        #printSection {
            display: none; background: white; padding: 40px;
            max-width: 210mm; margin: 0 auto;
            font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <div class="logo-icon">س</div>
                <h1>سند لاكسسوارات</h1>
                <p>نظام المحاسبة المتكامل</p>
            </div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="اسم المستخدم" value="admin">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة المرور" value="123456">
            </div>
            <button class="login-btn" onclick="login()">تسجيل الدخول</button>
        </div>
    </div>

    <!-- App -->
    <div id="app" class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>سند لاكسسوارات</h2>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" onclick="showPage('dashboard')">الرئيسية</div>
                <div class="nav-item" onclick="showPage('newInvoice')">فاتورة جديدة</div>
                <div class="nav-item" onclick="showPage('invoices')">الفواتير</div>
            </nav>
        </aside>
        
        <main class="main-content">
            <!-- Pages here -->
            <div id="newInvoice" class="page">
                <h1>فاتورة جديدة</h1>
                <button class="btn btn-primary" onclick="saveInvoice()">حفظ</button>
                <button class="btn btn-success" onclick="saveAndPrint()">حفظ وطباعة</button>
                <button class="btn btn-warning" onclick="downloadPDF()">تحميل PDF</button>
            </div>
        </main>
    </div>

    <!-- Print Section -->
    <div id="printSection">
        <!-- Invoice template -->
    </div>

    <script>
        // JavaScript code here
        let invoices = JSON.parse(localStorage.getItem('sanad_invoices')) || [];
        
        function login() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }
        
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
        }
        
        function saveInvoice() {
            const invoice = { number: 'INV-' + Date.now(), date: new Date(), total: 100 };
            invoices.push(invoice);
            localStorage.setItem('sanad_invoices', JSON.stringify(invoices));
            alert('تم الحفظ!');
        }
        
        function downloadPDF() {
            const element = document.getElementById('printSection');
            element.style.display = 'block';
            html2pdf().from(element).save('فاتورة.pdf');
            element.style.display = 'none';
        }
    </script>
</body>
</html>
